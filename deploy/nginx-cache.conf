# ============================================================
# boudydegeer.com — Nginx cache + security headers
# Paste this into the `server { ... }` block of your Forge site
# (Sites > boudydegeer.com > Edit Files > nginx Configuration)
# Place AFTER the `root` and `index` directives,
# BEFORE the `location /` block.
# ============================================================

# --- Hashed Vite build assets: immutable for 1 year ---
location ^~ /build/ {
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

# --- Top-level static assets (favicon, og-image, manifest): 7 days ---
location ~* ^/(favicon\.(ico|svg)|apple-touch-icon\.png|android-chrome-\d+x\d+\.png|og-image\.png|site\.webmanifest|robots\.txt|sitemap\.xml)$ {
    access_log off;
    add_header Cache-Control "public, max-age=604800" always;
    try_files $uri =404;
}

# --- Security headers (apply to all responses) ---
add_header X-Content-Type-Options    "nosniff"                   always;
add_header X-Frame-Options           "SAMEORIGIN"                always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
# Optional: Content-Security-Policy (start permissive, tighten later)
# add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; font-src 'self' https://fonts.bunny.net; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; script-src 'self' 'unsafe-inline';" always;

# --- Hide PHP version ---
fastcgi_hide_header X-Powered-By;
